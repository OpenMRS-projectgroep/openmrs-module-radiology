version: "3.8"

services:
  db:
    image: teleivo/openmrs-platform-mysql:2.0.0
    container_name: openmrs-platform-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DEV_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DEV_MYSQL_DATABASE}
    volumes:
      - openmrs-db-data:/var/lib/mysql
    networks:
      - backend-net

  openmrs:
    image: teleivo/openmrs-module-radiology:latest
    container_name: openmrs-module-radiology
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "127.0.0.1:${DEV_PORT}:8080"
    environment:
      MYSQL_HOST: ${DEV_MYSQL_HOST}
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${DEV_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DEV_MYSQL_DATABASE}

      PACS_HOST: ${PACS_HOST}
      PACS_ADMIN_USER: ${PACS_ADMIN_USER}
      PACS_ADMIN_PASSWORD: ${PACS_ADMIN_PASSWORD}
      PACS_WADO_URL: ${PACS_WADO_URL}
    volumes:
      - openmrs-app-data:/usr/local/tomcat/.OpenMRS
      - ./legacyui-1.2.omod:/usr/local/tomcat/.OpenMRS/modules/legacyui-1.2.omod
      - ./webservices.rest-2.17.omod:/usr/local/tomcat/.OpenMRS/modules/webservices.rest-2.17.omod
    networks:
      - backend-net

volumes:
  openmrs-db-data:
  openmrs-app-data:

networks:
  backend-net:
    driver: bridge