version: "3.8"

services:
  db-test:
    image: teleivo/openmrs-platform-mysql:2.0.0
    container_name: openmrs-platform-mysql-test
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${TEST_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${TEST_MYSQL_DATABASE}
    volumes:
      - openmrs-db-data-test:/var/lib/mysql
    networks:
      test-net:
        aliases:
          - db

  openmrs-test:
    image: teleivo/openmrs-module-radiology:latest
    container_name: openmrs-module-radiology-test
    restart: unless-stopped
    depends_on:
      - db-test
    ports:
      - "127.0.0.1:${TEST_PORT}:8080"
    environment:
      MYSQL_HOST: ${TEST_MYSQL_HOST}
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${TEST_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${TEST_MYSQL_DATABASE}
    volumes:
      - openmrs-app-data:/usr/local/tomcat/.OpenMRS
      - ./legacyui-1.2.omod:/usr/local/tomcat/.OpenMRS/modules/legacyui-1.2.omod
      - ./webservices.rest-2.17.omod:/usr/local/tomcat/.OpenMRS/modules/webservices.rest-2.17.omod
    networks:
      - test-net

volumes:
  openmrs-db-data-test:
  openmrs-app-data-test:

networks:
  test-net:
    driver: bridge