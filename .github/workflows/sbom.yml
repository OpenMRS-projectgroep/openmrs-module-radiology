name: CI with SBOM

on:
  push:
    branches: [ SBOM-genereren ]
  pull_request:
    branches: [ SBOM-genereren ]
  workflow_dispatch:

jobs:
  build-and-sbom:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: openmrs-module-radiology

    steps:
      # 1. Haal de code op
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Zet JDK 11 klaar (dit lost het probleem met de licentie-plugin op)
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Verzamel de dependencies via Maven (zonder tests uit te voeren)
      - name: Build with Maven
        run: mvn clean install -DskipTests

      # 4. Maak de 'docs' map aan binnen de module-map
      - name: Create docs directory
        run: mkdir -p docs

      # 5. Genereer de CycloneDX SBOM via de Maven plugin
      # Dit werkt nu vlekkeloos omdat we op Java 11 draaien
      - name: Generate CycloneDX SBOM via Maven
        run: |
          mvn org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom \
          -DschemaVersion=1.4 \
          -DoutputFormat=json \
          -DoutputName=sbom.cdx

      # 6. Verplaats de gegenereerde SBOM naar de docs/ map
      - name: Move SBOM to docs directory
        run: cp target/sbom.cdx.json docs/sbom.cdx.json

      # 7. Upload het bestand docs/sbom.cdx.json als een CI-artifact
      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: radiology-module-sbom
          path: openmrs-module-radiology/docs/sbom.cdx.json