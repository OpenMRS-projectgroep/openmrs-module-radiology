name: Java Build & GitHub SBOM Generation

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # Belangrijk: Schrijfrechten zijn vereist zodat GitHub de afhankelijkheden mag registreren
    permissions:
      contents: write

    steps:
      # 1. Haal de code op uit de repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Zet Java JDK 8 klaar (vereist voor deze radiology-module)
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      # 3. Bouw de module met Maven zodat alle dependencies lokaal aanwezig zijn
      - name: Build with Maven
        run: mvn clean install -DskipTests

      # 4. Genereer en exporteer de CycloneDX SBOM via de officiële GitHub Action
      - name: Export GitHub CycloneDX SBOM
        uses: advanced-security/component-detection-dependency-submission-action@v0.0.2
        with:
          source-path: '.'

      # 5. Sla de SBOM op als een downloadbaar CI-artifact bij de build output
      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: radiology-sbom
          path: '**/dependency-graph-snapshots/*.json'
          retention-days: 5