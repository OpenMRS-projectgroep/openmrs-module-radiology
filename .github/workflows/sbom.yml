name: CI with SBOM

on:
  push:
    branches: [ SBOM-genereren ]
  pull_request:
    branches: [ SBOM-genereren ]
  workflow_dispatch:

jobs:
  build-and-sbom:
    runs-on: ubuntu-latest

    # Hier stellen we in dat alle stappen standaard in de juiste submap starten
    defaults:
      run:
        working-directory: openmrs-module-radiology

    steps:
      # 1. Haal de code op (dit gebeurt altijd in de root van de repo)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Zet Java 1.8 (8) klaar
      - name: Set up JDK 1.8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Bouw de module met Maven (loopt nu direct in openmrs-module-radiology)
      - name: Build with Maven
        run: mvn clean install -DskipTests

      # 4. Maak de 'docs' map aan binnen de module-map
      - name: Create docs directory
        run: mkdir -p docs

      # 5. Genereer de CycloneDX SBOM via de Maven plugin
      - name: Generate CycloneDX SBOM via Maven
        run: |
          mvn org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom \
          -DschemaVersion=1.4 \
          -DoutputFormat=json \
          -DoutputName=sbom.cdx

      # 6. Verplaats de gegenereerde SBOM naar de docs/ map (staat standaard in target/)
      - name: Move SBOM to docs directory
        run: cp target/sbom.cdx.json docs/sbom.cdx.json

      # 7. Upload het bestand docs/sbom.cdx.json als een CI-artifact
      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: radiology-module-sbom
          path: openmrs-module-radiology/docs/sbom.cdx.json