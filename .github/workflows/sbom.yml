name: CI with SBOM

on:
  push:
    branches: [ SBOM-genereren ]
  pull_request:
    branches: [ SBOM-genereren ]
  workflow_dispatch: # Hiermee kun je de actie ook handmatig triggeren in GitHub

jobs:
  build-and-sbom:
    runs-on: ubuntu-latest

    steps:
      # 1. Haal de code van de branch op
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Zet Java 1.8 (8) klaar, aangezien de OpenMRS module hierop draait
      - name: Set up JDK 1.8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Bouw de module met Maven (dit zorgt dat alle dependencies geladen zijn)
      - name: Build with Maven
        run: mvn clean install -DskipTests

      # 4. Maak de 'docs' map aan als deze nog niet bestaat
      - name: Create docs directory
        run: mkdir -p docs

      # 5. Genereer de SBOM in CycloneDX JSON-formaat via GitHub's SBOM-action
      - name: Generate GitHub SBOM
        uses: github/sbom-action/generate@v0
        with:
          output-path: 'docs/sbom.cdx.json'

      # 6. Upload het bestand docs/sbom.cdx.json als een CI-artifact
      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: radiology-module-sbom
          path: docs/sbom.cdx.json